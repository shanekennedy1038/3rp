<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3RP LinkedIn Banner — 1584 × 396</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1584px;
      height: 396px;
      overflow: hidden;
      background: #000d2e;
    }

    .banner {
      width: 1584px;
      height: 396px;
      background: linear-gradient(135deg, #000d2e 0%, #00255b 45%, #001a45 72%, #000d2e 100%);
      display: flex;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    /* Subtle dot grid */
    .banner::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.035) 1px, transparent 1px);
      background-size: 44px 44px;
      pointer-events: none;
    }

    /* Blue glow behind 3RP logo */
    .glow-left {
      position: absolute;
      width: 700px;
      height: 700px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(22,97,190,0.18) 0%, transparent 65%);
      top: -200px;
      left: -80px;
      pointer-events: none;
    }

    /* Red accent glow */
    .glow-right {
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(199,70,52,0.08) 0%, transparent 65%);
      bottom: -180px;
      right: 100px;
      pointer-events: none;
    }

    /* ---- LEFT SECTION ---- */
    .left-section {
      position: relative;
      z-index: 2;
      width: 510px;
      flex-shrink: 0;
      padding: 0 72px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 14px;
    }

    .logo-3rp {
      width: 380px;
      height: auto;
      display: block;
    }

    .tagline {
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      font-size: 16px;
      font-weight: 400;
      color: rgba(255,255,255,0.52);
      letter-spacing: 0.03em;
      padding-left: 2px;
    }

    /* ---- DIVIDER ---- */
    .divider {
      width: 1px;
      height: 230px;
      flex-shrink: 0;
      background: linear-gradient(to bottom,
        transparent 0%,
        rgba(255,255,255,0.12) 25%,
        rgba(255,255,255,0.18) 50%,
        rgba(255,255,255,0.12) 75%,
        transparent 100%
      );
      position: relative;
      z-index: 2;
    }

    /* ---- RIGHT SECTION ---- */
    .right-section {
      position: relative;
      z-index: 2;
      flex: 1;
      padding: 0 68px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 26px;
    }

    .trusted-label {
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      font-size: 11.5px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
    }

    .logos-row {
      display: flex;
      align-items: center;
      gap: 0;
      justify-content: space-between;
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
    }

    /* Greyscale + lightened for dark bg — SVGs with coloured or dark fills */
    .logo-grey {
      height: 40px;
      width: auto;
      max-width: 160px;
      object-fit: contain;
      filter: grayscale(1) brightness(3);
      opacity: 0.75;
    }

    /* White SVGs — already visible on dark bg, just desaturate */
    .logo-white {
      height: 38px;
      width: auto;
      max-width: 160px;
      object-fit: contain;
      filter: grayscale(1) brightness(1.1);
      opacity: 0.80;
    }

    /* PNGs with white backgrounds — invert to make bg black, letters go light */
    .logo-png-invert {
      height: 44px;
      width: auto;
      max-width: 150px;
      object-fit: contain;
      filter: grayscale(1) invert(1) brightness(1.3);
      opacity: 0.78;
    }

    /* CTO Labs: brandmark + logotype side by side */
    .cto-group {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .cto-mark {
      height: 38px;
      width: auto;
      filter: grayscale(1) brightness(3);
      opacity: 0.75;
    }

    .cto-logotype {
      height: 24px;
      width: auto;
      filter: grayscale(1) brightness(1.1);
      opacity: 0.80;
    }
  </style>
</head>
<body>
  <div class="banner">
    <div class="glow-left"></div>
    <div class="glow-right"></div>

    <!-- LEFT: 3RP branding -->
    <div class="left-section">
      <img
        src="clients/3RP Icon (1).svg"
        alt="3RP"
        class="logo-3rp"
      >
      <div class="tagline">Vendor Advocacy &amp; Technology Recommendation</div>
    </div>

    <div class="divider"></div>

    <!-- RIGHT: client logos -->
    <div class="right-section">
      <div class="trusted-label">Trusted by global SAP leaders</div>
      <div class="logos-row">

        <!-- Rev-Trac (coloured SVG → greyscale + brightened) -->
        <div class="logo-wrap">
          <img
            src="clients/Rev-TracwithTag_Horiz_colourcmyk (1).svg"
            alt="Rev-Trac"
            class="logo-grey"
          >
        </div>

        <!-- Turnkey (white SVG — already light on dark) -->
        <div class="logo-wrap">
          <img
            src="clients/turkey_logo_white.svg"
            alt="Turnkey"
            class="logo-white"
          >
        </div>

        <!-- CTO Labs (brandmark + white logotype) -->
        <div class="logo-wrap">
          <div class="cto-group">
            <img
              src="clients/cto-dark.svg"
              alt=""
              class="cto-mark"
            >
            <img
              src="clients/CTOLabs_Logotype_White.svg"
              alt="CTO Labs"
              class="cto-logotype"
            >
          </div>
        </div>

        <!-- BCS (blue PNG on white bg → greyscale + invert) -->
        <div class="logo-wrap">
          <img
            src="clients/BCS-Logo_Blue (1).png"
            alt="BCS"
            class="logo-png-invert"
          >
        </div>

        <!-- Hicron (grey+orange PNG on white bg → greyscale + invert) -->
        <div class="logo-wrap">
          <img
            src="clients/Hicron_logo.png"
            alt="Hicron"
            class="logo-png-invert"
          >
        </div>

      </div>
    </div>

  </div>
</body>
</html>
